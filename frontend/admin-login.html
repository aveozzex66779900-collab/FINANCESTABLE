<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Admin Login</title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />
</head>

<body>

  <div class="login-container">

    <div class="login-box">

      <h2>🔐 Admin Login</h2>

      <input
        type="email"
        id="email"
        placeholder="Admin Email"
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
      />

      <button
        id="adminLoginBtn"
        onclick="login()"
      >
        Login
      </button>

    </div>

  </div>

  <script src="./js/config.js"></script>
  <script src="./js/auth/auth-api.js"></script>

  <script>

    async function login() {

      const email =
        document.getElementById("email").value;

      const password =
        document.getElementById("password").value;

      try {

        const result =
          await authPost("/api/auth/login", {
            email,
            password
          });

        console.log(result);

        if (!result.success) {
          alert(result.message);
          return;
        }

        if (result.role !== "admin") {
          alert("Not admin account");
          return;
        }

        localStorage.setItem(
          "admin",
          JSON.stringify(result.user)
        );

        alert("Admin login success ✅");

        window.location.href =
          "/admin.html";

      } catch (err) {

        console.error(err);

        alert(
          "Backend not reachable"
        );
      }
    }

  </script>

</body>
</html>
