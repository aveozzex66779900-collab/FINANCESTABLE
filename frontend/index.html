
<!DOCTYPE html>

  <style>
/* 🌿 MAIN BACKGROUND */
body {
  background: linear-gradient(135deg, #f1fff5, #fff5f5);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* ✨ SOFT BACKGROUND BLOBS (premium feel) */
body::before,
body::after {
  content: "";
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  z-index: -1;
}

body::before {
  background: rgba(0, 255, 150, 0.25);
  top: -100px;
  left: -100px;
}

body::after {
  background: rgba(255, 100, 100, 0.25);
  bottom: -100px;
  right: -100px;
}

/* 🧊 CARD UPGRADE */
.card {
  background: rgba(255, 255, 255, 0.75) !important;
  backdrop-filter: blur(12px);
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  transition: 0.3s ease;
}

.card:hover {
  transform: translateY(-6px);
}

/* 🔘 BUTTON STYLE */
button {
  background: linear-gradient(135deg, #00c853, #ff5252);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 16px;
  transition: 0.2s ease;
}

button:hover {
  transform: scale(1.05);
}

/* 🧠 HERO SECTION IMPROVE */
.hero {
  background: linear-gradient(135deg, #e8fff0, #fff0f0);
  border-radius: 20px;
}

/* ✨ TEXT */
h1, h2, h3 {
  color: #111;
}

p {
  color: #555;
}
</style>
</head>
