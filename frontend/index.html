    <a href="signup.html" class="btn">Start Free</a>
    <a href="admin-login.html">Admin</a>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Accept Payments Like a Pro</h1>
    <p>UPI • Cards • Crypto • Links</p>
    <a href="signup.html" class="btn-big">Get Started</a> 
  </div>

  <!-- ✅ Correct hero image -->

<section class="features">

<!-- 📷 QR Scanner Section -->
<h2>Scan & Pay</h2>

<video id="preview" style="width:300px;"></video>

<button onclick="startScanner()">Start Scanner</button>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
function startScanner() {
  const html5QrCode = new Html5Qrcode("preview");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      // 👉 Redirect to payment page with ID
      window.location.href = "pay.html?id=" + decodedText;
    }
  );
}
</script>


</section>

</footer>
