




<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="center">

  <div class="auth-box">

  <h2>Create Account</h2>



















  <input
  id="name"
  type="text"
  placeholder="Full Name"
/>

<input
  id="email"
  type="email"
  placeholder="Email"
/>

<input
  id="password"
  type="password"
  placeholder="Password"
/>


<button onclick="signup()">
  Sign Up
</button>
<p id="msg"></p>
  

</div>
  

  
<script src="js/config.js"></script>
<script src="js/auth/signup.js"></script>
</body>
</html>
