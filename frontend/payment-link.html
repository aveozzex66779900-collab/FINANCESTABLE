<!DOCTYPE html>
<html>
<head>
  <title>Payment Link</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="fade-in">

<div class="glass" style="padding:30px; max-width:500px; margin:50px auto; text-align:center;">

  <h2>🔗 Generate Payment Link</h2>

  <input id="amount" type="number" placeholder="Enter Amount" />
  <br><br>

  <button class="btn primary" onclick="generateLink()">Generate Link</button>

  <p id="linkBox" style="margin-top:20px;"></p>

</div>

<script>
function generateLink(){
  let amount = document.getElementById("amount").value;

  let link = window.location.origin + "/pay.html?amount=" + amount;

  document.getElementById("linkBox").innerHTML =
    "<b>Link:</b> <br><a href='" + link + "'>" + link + "</a>";
}
</script>

</body>
</html>
