<!DOCTYPE html>
<html>
<head>
  <title>Smart Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color:white;
      min-height:100vh;
    }

    /* 🔥 Animated background */
    body::before {
      content:"";
      position:fixed;
      width:200%;
      height:200%;
      background:
        radial-gradient(circle at 20% 20%, #22c55e30, transparent),
        radial-gradient(circle at 80% 80%, #3b82f630, transparent);
      animation: moveBg 12s linear infinite;
      z-index:-1;
    }

    @keyframes moveBg {
      0% { transform:translate(0,0); }
      100% { transform:translate(-60px,-60px); }
    }

    .container {
      padding:20px;
      max-width:1200px;
      margin:auto;
    }

    /* HEADER */
    .header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .header h1 {
      font-size:22px;
    }

    .avatar {
      width:40px;
      height:40px;
      border-radius:50%;
      background:#22c55e;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
    }

    /* 💳 Wallet */
    .wallet {
      background:linear-gradient(135deg,#22c55e,#16a34a);
      border-radius:20px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 10px 30px rgba(34,197,94,0.4);
      animation:fadeUp 0.6s ease;
    }

    .wallet h2 {
      font-size:14px;
      opacity:0.8;
    }

    .wallet .balance {
      font-size:26px;
      font-weight:bold;
    }

    /* GRID */
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
    }

    .card {
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(15px);
      border-radius:20px;
      padding:18px;
      border:1px solid rgba(255,255,255,0.1);
      transition:0.3s;
    }

    .card:hover {
      transform:translateY(-8px) scale(1.02);
      box-shadow:0 20px 40px rgba(0,0,0,0.5);
    }

    .card img {
      width:100%;
      height:130px;
      object-fit:cover;
      border-radius:12px;
      margin-bottom:10px;
    }

    .icon {
      font-size:22px;
    }

    h3 {
      margin:5px 0;
    }

    p {
      font-size:13px;
      opacity:0.7;
    }

    button {
      margin-top:10px;
      padding:10px;
      width:100%;
      border:none;
      border-radius:10px;
      background:linear-gradient(135deg,#22c55e,#4ade80);
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover {
      transform:scale(1.05);
      box-shadow:0 10px 20px rgba(34,197,94,0.3);
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to { opacity:1; transform:translateY(0); }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>🚀 Smart Hub</h1>
    <div class="avatar">U</div>
  </div>

  <!-- WALLET -->
  <div class="wallet">
    <h2>Wallet Balance</h2>
    <div class="balance">₹0.00</div>
  </div>

  <!-- GRID -->
  <div class="grid">

    <!-- AI SUPPORT -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995"
           onerror="this.src='https://via.placeholder.com/300x130?text=AI+Support'">
      <div class="icon">🤖</div>
      <h3>AI Support</h3>
      <p>24/7 smart assistant</p>
      <button onclick="openSupport()">Open</button>
    </div>

    <!-- AFFILIATE -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d"
           onerror="this.src='https://via.placeholder.com/300x130?text=Affiliate'">
      <div class="icon">💰</div>
      <h3>Affiliate</h3>
      <p>Earn money from referrals</p>
      <button onclick="openAffiliate()">Open</button>
    </div>

    <!-- PROFILE -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12"
           onerror="this.src='https://via.placeholder.com/300x130?text=Profile'">
      <div class="icon">👤</div>
      <h3>Profile</h3>
      <p>Manage account & bank</p>
      <button onclick="openProfile()">Open</button>
    </div>

    <!-- SETTINGS -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1581091870627-3a4c6b1b4c27"
           onerror="this.src='https://via.placeholder.com/300x130?text=Settings'">
      <div class="icon">⚙️</div>
      <h3>Settings</h3>
      <p>App preferences</p>
      <button onclick="openSettings()">Open</button>
    </div>

  </div>

</div>

<!-- KEEP YOUR FUNCTIONS -->
<script>
function openSupport() {
  window.location.href = "support.html";
}

function openAffiliate() {
  window.location.href = "affiliate.html";
}

function openProfile() {
  window.location.href = "profile.html";
}

function openSettings() {
  window.location.href = "setting.html"; // ⚠️ your file name
}
</script>

</body>
</html>
