<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Lottie -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.8s ease;
    }

    h1 {
      margin-top: 10px;
      font-size: 26px;
      color: #22c55e;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    .amount {
      font-size: 32px;
      font-weight: bold;
      margin: 15px 0;
    }

    .details {
      text-align: left;
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.8;
    }

    .details div {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
    }

    .btn {
      margin-top: 25px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- Animation -->
    <lottie-player
      src="https://assets10.lottiefiles.com/packages/lf20_jbrw3hcz.json"
      background="transparent"
      speed="1"
      style="width: 150px; height: 150px; margin:auto;"
      autoplay>
    </lottie-player>

    <h1>Payment Successful</h1>
    <p>Your transaction was completed 🎉</p>

    <!-- Dynamic Amount -->
    <div class="amount" id="amount">₹0</div>

    <!-- Transaction Details -->
    <div class="details">
      <div><span>Email</span><span id="email">-</span></div>
      <div><span>Method</span><span id="method">UPI</span></div>
      <div><span>Status</span><span style="color:#22c55e;">Success</span></div>
      <div><span>Time</span><span id="time"></span></div>
      <div><span>Txn ID</span><span id="txn"></span></div>
    </div>

    <!-- Button -->
    <button class="btn" onclick="goHome()">Back to Dashboard</button>

  </div>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    // 🎉 CONFETTI
    setTimeout(() => {
      confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 }
      });
    }, 300);

    // 🧠 LOAD DATA FROM LOCALSTORAGE
    const email = localStorage.getItem("email") || "guest";
    const amount = localStorage.getItem("lastAmount") || "0";
    const method = localStorage.getItem("lastMethod") || "UPI";

    document.getElementById("email").innerText = email;
    document.getElementById("amount").innerText = "₹" + amount;
    document.getElementById("method").innerText = method;

    // ⏱ TIME
    const now = new Date();
    document.getElementById("time").innerText = now.toLocaleString();

    // 🔐 FAKE TXN ID
    document.getElementById("txn").innerText =
      "TXN" + Math.floor(Math.random() * 1000000000);

    // 🔁 REDIRECT
    function goHome() {
      window.location.href = "dashboard.html";
    }
  </script>

</body>
</html>
