<!DOCTYPE html>
<html>
<head>
  <title>StableFin AI Dashboard</title>
  <link rel="icon" href="data:,">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .navbar {
      background: #020617;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
    }

    .navbar a {
      color: #38bdf8;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #16a34a; }

    canvas {
      margin-top: 20px;
    }
  </style>
















<style>
body {
  background: linear-gradient(135deg, #e8f5e9, #f1f8f4);
  color: #1b1b1b;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* AI Cards only */
.ai-card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  transition: 0.25s ease;
}

.ai-card:hover {
  transform: translateY(-4px);
}

/* Buttons inside this page */
.ai-btn {
  background: linear-gradient(135deg, #00c853, #00e676);
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
}





body {
  background: linear-gradient(135deg, #e8f5e9, #f1f8f4) !important;
}
.container {
  padding: 20px;
  gap: 20px;
}
</style>






</head>

<body>

<header class="navbar">
  <h2>🤖 StableFin AI</h2>
  <div>
    <a href="index.html">Dashboard</a>
  <a href="#b2b">B2B Pay</a> <!-- NEW -->

  </div>
</header>

<div class="container">

  <!-- 📊 Portfolio Optimization -->
    <div class="card ai-card">
    <h3>📊 AI Portfolio Optimization</h3>
    <p>Optimize investments using AI</p>

    <button onclick="runPortfolio()">Run Optimization</button>

    <canvas id="portfolioChart"></canvas>
  </div>

  <!-- 🚨 Fraud Detection -->
  




<div class="fraud-card">

  <h2>🛡 AI Fraud Detection</h2>

  <input
    type="number"
    id="fraudAmount"
    placeholder="Enter transaction amount"
  />

  <button onclick="runFraudCheck()">
    Check Fraud
  </button>

  <div id="fraudResult"></div>

</div>
<script>
/* 📊 Portfolio Chart */
const ctx = document.getElementById('portfolioChart');

let chart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ["Stocks", "Crypto", "Gold"],
    datasets: [{
      label: "Investment %",
      data: [40, 30, 30]
    }]
  }
});

/* 🚀 Run Portfolio Optimization */
function runPortfolio() {
  // Simulated AI response
  const data = [50, 20, 30];

  chart.data.datasets[0].data = data;
  chart.update();

  showLoading();

setTimeout(() => {
  hideLoading();
  showSuccessModal("Portfolio optimized using AI 🚀");
}, 1500);
}

/* 🚨 Fraud Detection */
async function checkFraud() {
  try {
    const amount = document.getElementById("amount").value;

    if (!amount || amount <= 0) {
      alert("Enter valid amount ❌");
      return;
    }

    showLoading(); // optional premium UX





    const res = await fetch ("http://localhost:5000/api/premium-ai/fraud-check", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    amount: Number(amount),
    transactions: 1
  })
});



    // ✅ FIX HERE
    const data = await res.json();

    hideLoading();

    document.getElementById("fraudResult").innerText =
      data.fraud
        ? `🚨 Fraud Detected (Risk: ${data.riskScore})`
        : `✅ Safe Transaction (Risk: ${data.riskScore})`;

  } catch (err) {
    console.error("Fraud API Error:", err);
    hideLoading();
    alert("Fraud detection failed ❌");
  }
}






</script>
<script src="js/app.js"></script>

<script src="./js/ai-safe.js"></script>
</body>
</html>
